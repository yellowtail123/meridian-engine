name = "fishbase-proxy"
main = "src/index.js"
compatibility_date = "2024-01-01"

routes = [
  { pattern = "meridian-engine.com/api/fishbase/*", zone_name = "meridian-engine.com" },
  { pattern = "www.meridian-engine.com/api/fishbase/*", zone_name = "meridian-engine.com" },
  { pattern = "meridian-engine.com/api/sealifebase/*", zone_name = "meridian-engine.com" },
  { pattern = "www.meridian-engine.com/api/sealifebase/*", zone_name = "meridian-engine.com" }
]
